<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Baccarat Jxwon Multi-Edition</title>
    <style>
        :root { --p-blue: #1e88e5; --b-red: #e53935; --t-green: #43a047; --gold: #ffd700; }
        body { background: #0a0a0a; color: white; font-family: 'Malgun Gothic', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; user-select: none; overflow-x: hidden; }
        
        /* 상단 헤더 */
        #header { width: 100%; background: #1a1a1a; padding: 12px 0; display: flex; justify-content: space-around; align-items: center; border-bottom: 2px solid var(--gold); position: sticky; top:0; z-index:1000; }
        .btn-small { background: #333; color: #fff; border: 1px solid #555; padding: 5px 10px; cursor: pointer; border-radius: 4px; font-size: 0.8rem; }

        /* 게임 테이블 */
        #table { width: 1000px; height: 500px; background: radial-gradient(#265e29, #0a240a); border: 15px solid #2b1d1d; border-radius: 250px; position: relative; margin: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        #timer-display { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-size: 4rem; font-weight: 900; color: var(--gold); text-shadow: 0 0 15px rgba(0,0,0,0.8); }
        
        .card-zone { position: absolute; width: 300px; text-align: center; top: 100px; }
        #p-zone { left: 100px; } #b-zone { right: 100px; }
        .score-box { background: rgba(0,0,0,0.8); padding: 5px 15px; border-radius: 20px; color: var(--gold); font-size: 1.2rem; }
        .cards-display { display: flex; justify-content: center; gap: 10px; min-height: 110px; margin-top: 15px; }
        
        /* 카드 디자인 */
        .card { width: 75px; height: 110px; background: white; color: black; border-radius: 6px; position: relative; box-shadow: 2px 4px 10px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: center; animation: dealAnim 0.3s ease-out; }
        .card.red { color: #d32f2f; }
        .card .rank { position: absolute; top: 5px; left: 5px; font-size: 14px; font-weight: bold; }
        .card .suit { font-size: 38px; }
        @keyframes dealAnim { from { transform: translateY(-100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* 베팅 구역 */
        .bet-layout { position: absolute; bottom: 25px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .row { display: flex; gap: 8px; }
        .bet-box { min-width: 110px; height: 55px; border: 2px solid rgba(255,255,255,0.1); border-radius: 10px; background: rgba(0,0,0,0.6); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .bet-val { color: var(--gold); font-weight: bold; font-size: 0.8rem; }
        .winning { animation: flash 0.5s infinite; border-color: var(--gold) !important; }
        @keyframes flash { 50% { background: var(--gold); color: black; } }

        /* 칩 컨트롤 */
        #controls { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; background: #1a1a1a; padding: 10px 25px; border-radius: 50px; }
        .chip { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; border: 3px solid rgba(255,255,255,0.2); font-size: 0.7rem; }
        .chip.selected { transform: translateY(-8px); border-color: var(--gold); }
        .c1 { background: #2e7d32; } .c2 { background: #c62828; } .c3 { background: #1565c0; } .c4 { background: #6a1b9a; } .c5 { background: #ef6c00; }
        .cmax { background: var(--gold); color: black; }

        /* 로드맵 */
        #roadmap-container { width: 980px; height: 160px; background: white; border: 4px solid #333; overflow-x: auto; margin-bottom: 20px; }
        #roadmap-grid { display: grid; grid-template-rows: repeat(6, 26px); grid-auto-columns: 26px; grid-auto-flow: column; width: fit-content; background-image: linear-gradient(#eee 1px, transparent 1px), linear-gradient(90deg
