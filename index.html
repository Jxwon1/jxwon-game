<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J-BACCARAT - Master Edition</title>
    <style>
        :root { --p-blue: #1e88e5; --b-red: #e53935; --t-green: #43a047; --gold: #ffc107; }
        body { background: #121212; color: white; margin: 0; font-family: 'Malgun Gothic', sans-serif; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }

        /* 1. 로그인 섹션 (디자인 유지) */
        #login-section { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .box { background: #1e1e1e; padding: 30px; border-radius: 15px; width: 320px; text-align: center; border: 1px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; background: #2a2a2a; color: white; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; background: #007bff; color: white; }
        #signupBtn { background: #444; color: #ccc; }

        /* 2. 게임 섹션 */
        #game-section { display: none; width: 100%; flex-direction: column; align-items: center; }
        #header { width: 100%; background: #1a1a1a; padding: 15px 0; display: flex; justify-content: space-around; border-bottom: 2px solid var(--gold); }
        #engine-status { font-size: 0.7rem; color: transparent; font-weight: bold; } /* 마스터에게만 보임 */

        /* 테이블 및 타이머 */
        #table { width: 950px; height: 500px; background: radial-gradient(#265e29, #0a240a); border: 15px solid #2b1d1d; border-radius: 250px; position: relative; margin: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        #timer-box { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); text-align: center; }
        #timer-val { font-size: 5rem; font-weight: 900; color: var(--gold); line-height: 1; }

        /* 카드 및 베팅 구역 */
        .card-zone { position: absolute; top: 160px; width: 220px; text-align: center; font-weight: bold; }
        #p-zone { left: 150px; color: var(--p-blue); }
        #b-zone { right: 150px; color: var(--b-red); }
        .cards-display { display: flex; justify-content: center; gap: 10px; min-height: 120px; margin-top: 10px; }
        .card { width: 80px; height: 120px; background: white; color: black; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 2rem; box-shadow: 3px 3px 10px rgba(0,0,0,0.5); }

        .bet-area { position: absolute; bottom: 50px; width: 100%; display: flex; justify-content: center; gap: 20px; }
        .bet-box { width: 160px; height: 90px; background: rgba(0,0,0,0.6); border: 2px solid #444; border-radius: 15px; cursor: pointer; text-align: center; padding-top: 10px; }
        .bet-box:hover { background: rgba(255,255,255,0.1); }

        /* 마스터 조종기 */
        #admin-panel { width: 950px; background: #111; border: 3px solid var(--gold); padding: 20px; border-radius: 20px; display: none; margin-bottom: 30px; }
        .adm-btn { background: #333; color: white; border: 1px solid #555; padding: 12px; cursor: pointer; border-radius: 5px; font-weight: bold; width: 100%; }
        .adm-active { background: var(--gold) !important; color: black !important; }
    </style>
</head>
<body>

    <div id="login-section">
        <div class="box">
            <h2 style="color:var(--gold)">J-BACCARAT</h2>
            <input type="email" id="u_email" placeholder="이메일 주소">
            <input type="password" id="u_pw" placeholder="비밀번호">
            <button class="btn-main" id="loginBtn">로그인</button>
            <button class="btn-main" id="signupBtn">신규 가입 (10만 지급)</button>
        </div>
    </div>

    <div id="game-section">
        <div id="header">
            <div id="user-display">Loading...</div>
            <div id="engine-status">OFFLINE</div>
            <div>내 자산: <span id="balance" style="color:var(--gold)">0</span>원</div>
        </div>

        <div id="table">
            <div id="timer-box">
                <div id="timer-val">00</div>
                <div id="state-text" style="color:#aaa; font-weight:bold;">READY</div>
            </div>
            
            <div id="p-zone" class="card-zone">PLAYER <span id="p-score"></span><div id="p-cards" class="cards-display"></div></div>
            <div id="b-zone" class="card-zone">BANKER <span id="b-score"></span><div id="b-cards" class="cards-display"></div></div>

            <div class="bet-area">
                <div class="bet-box" onclick="placeBet('P')" style="border-color:var(--p-blue)">PLAYER<br><span id="bet-p" style="color:var(--gold)">0</span></div>
                <div class="bet-box" onclick="placeBet('T')" style="border-color:var(--t-green)">TIE<br><span id="bet-t" style="color:var(--gold)">0</span></div>
                <div class="bet-box" onclick="placeBet('B')" style="border-color:var(--b-red)">BANKER<br><span id="bet-b" style="color:var(--gold)">0</span></div>
            </div>
        </div>

        <div id="admin-panel">
            <h3 style="color:var(--gold); text-align:center; margin-top:0;">🛡️ MASTER CONTROL</h3>
            <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:10px;">
                <button class="adm-btn" id="btn-P" onclick="setControl('P')">PLAYER 승</button>
                <button class="adm-btn" id="btn-B" onclick="setControl('B')">BANKER 승</button>
                <button class="adm-btn" id="btn-T" onclick="setControl('T')">TIE 승</button>
                <button class="adm-btn" id="btn-RANDOM" onclick="setControl('RANDOM')">랜덤 모드</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB82nryTqpxf0Gl4Mq0djXI2nsSYnvhXBo",
            authDomain: "baccaratjxwon.firebaseapp.com",
            projectId: "baccaratjxwon",
            storageBucket: "baccaratjxwon.firebasestorage.app",
            messagingSenderId: "649239216574",
            appId: "1:649239216574:web:e7c0f4a41a676c397939ef"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const MASTER_EMAIL = "wonnnworkdy1@gmail.com";
        let myMoney = 0;
        let myLocalBets = { P:0, B:0, T:0 };
        let engineInterval = null;

        // 로그인/회원가입 로직
        document.getElementById('signupBtn').onclick = async () => {
            const email = document.getElementById('u_email').value;
            const pw = document.getElementById('u_pw').value;
            try {
                await createUserWithEmailAndPassword(auth, email, pw);
                await setDoc(doc(db, "users", email), { money: 100000, isAdmin: false });
                alert("가입 성공! 10만 원이 지급되었습니다.");
            } catch (e) { alert("실패: " + e.message); }
        };

        document.getElementById('loginBtn').onclick = () => {
            const email = document.getElementById('u_email').value;
            const pw = document.getElementById('u_pw').value;
            signInWithEmailAndPassword(auth, email, pw).catch(e => alert("로그인 실패"));
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('game-section').style.display = 'flex';
                document.getElementById('user-display').innerText = user.email;

                if(user.email === MASTER_EMAIL) {
                    document.getElementById('admin-panel').style.display = 'block';
                    document.getElementById('engine-status').style.color = 'var(--gold)';
                }

                onSnapshot(doc(db, "users", user.email), s => {
                    myMoney = s.data().money;
                    document.getElementById('balance').innerText = myMoney.toLocaleString();
                });

                initEngineRelay(user.email);
            }
        });

        // 엔진 릴레이 및 게임 시스템
        function initEngineRelay(myEmail) {
            onSnapshot(doc(db, "game", "status"), async (snap) => {
                const data = snap.data();
                document.getElementById('timer-val').innerText = data.timer;
                document.getElementById('state-text').innerText = data.state;

                const isMaster = (myEmail === MASTER_EMAIL);
                const isStalled = !data.lastTick || (Date.now() - data.lastTick > 4000);

                if (isMaster || isStalled) {
                    if (!engineInterval) startEngine(myEmail);
                }

                if(data.state === "DEALING") { renderCards(data.cards); }
                if(data.state === "WAITING") { clearUI(); }
            });
        }

        function startEngine(email) {
            engineInterval = setInterval(async () => {
                const ref = doc(db, "game", "status");
                const d = (await getDoc(ref)).data();
                const now = Date.now();

                if (email !== MASTER_EMAIL && d.host === MASTER_EMAIL && (now - d.lastTick < 3000)) {
                    clearInterval(engineInterval); engineInterval = null;
                    return;
                }

                document.getElementById('engine-status').innerText = (email === MASTER_EMAIL) ? "M-RUN" : "AUTO";

                if (d.state === "WAITING") {
                    if (d.timer > 0) {
                        await updateDoc(ref, { timer: increment(-1), host: email, lastTick: now });
                    } else {
                        const res = calculateResult(d.forceWin);
                        await updateDoc(ref, { state: "DEALING", cards: res, host: email, lastTick: now });
                        setTimeout(async () => {
                            await updateDoc(ref, { state: "WAITING", timer: 20, forceWin: "RANDOM", lastTick: Date.now() });
                        }, 8000);
                    }
                } else { await updateDoc(ref, { lastTick: now, host: email }); }
            }, 1000);
        }

        function calculateResult(force) {
            // 바카라 계산 로직 생략 (기존 엔진과 동일)
            return { player: ["A", "7"], banker: ["K", "5"], winner: "P", pScore: 8, bScore: 5 };
        }

        window.placeBet = async (type) => {
            if(myMoney < 10000) return;
            await updateDoc(doc(db, "users", auth.currentUser.email), { money: increment(-10000) });
            myLocalBets[type] += 10000;
            document.getElementById('bet-' + type.toLowerCase()).innerText = myLocalBets[type].toLocaleString();
        };

        window.setControl = async (win) => await updateDoc(doc(db, "game", "status"), { forceWin: win });
        function renderCards(c) { /* 카드 렌더링 */ }
        function clearUI() { /* UI 초기화 */ }
    </script>
</body>
</html>
