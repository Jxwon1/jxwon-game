<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>J-BACCARAT Login</title>
    <style>
        body { background: #121212; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .box { background: #1e1e1e; padding: 30px; border-radius: 15px; width: 320px; text-align: center; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; background: #2a2a2a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; background: #007bff; color: white; }
        #signupBtn { background: #444; color: #ccc; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color:#ffc107">J-BACCARAT</h2>
        <input type="email" id="u_email" placeholder="이메일 주소">
        <input type="password" id="u_pw" placeholder="비밀번호">
        <button id="loginBtn">로그인</button>
        <button id="signupBtn">신규 가입 (10만 지급)</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB82nryTqpxf0Gl4Mq0djXI2nsSYnvhXBo",
            authDomain: "baccaratjxwon.firebaseapp.com",
            projectId: "baccaratjxwon",
            storageBucket: "baccaratjxwon.firebasestorage.app",
            messagingSenderId: "649239216574",
            appId: "1:649239216574:web:e7c0f4a41a676c397939ef"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('signupBtn').onclick = async () => {
            const email = document.getElementById('u_email').value;
            const pw = document.getElementById('u_pw').value;
            try {
                const cred = await createUserWithEmailAndPassword(auth, email, pw);
                // 여기서 100000원(10만 원)으로 설정했습니다.
                await setDoc(doc(db, "users", email), {
                    money: 100000, 
                    isAdmin: false
                });
                alert("가입 성공! 10만 원이 지급되었습니다.");
            } catch (e) { alert("가입 실패: " + e.message); }
        };

        document.getElementById('loginBtn').onclick = () => {
            const email = document.getElementById('u_email').value;
            const pw = document.getElementById('u_pw').value;
            signInWithEmailAndPassword(auth, email, pw)
                .then(() => { location.href = "game.html"; })
                .catch(e => alert("로그인 실패"));
        };
    </script>
</body>
</html>
